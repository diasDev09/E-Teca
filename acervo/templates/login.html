{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-4 text-primary mb-2">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <h2 class="fw-bold">Bem-vindo</h2>
                    <p class="text-muted">Acesse sua conta para continuar</p>
                </div>

                <form method="post" class="needs-validation">
                    {% csrf_token %}
                    
                    <div class="django-form-style">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-0 text-muted">Ainda não tem uma conta?</p>
                    <a href="{% url 'signup' %}" class="fw-bold text-decoration-none">Crie sua conta aqui</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Isso força os campos do Django a ficarem com aparência de Bootstrap */
    .django-form-style p label { display: block; margin-bottom: 5px; font-weight: 500; color: #495057; }
    .django-form-style p input { 
        display: block; width: 100%; padding: 10px; 
        border: 1px solid #ced4da; border-radius: 8px; 
        transition: border-color .15s ease-in-out;
    }
    .django-form-style p input:focus { border-color: #0d6efd; outline: 0; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
    .django-form-style .helptext { display: block; font-size: 0.8rem; color: #6c757d; margin-top: 5px; }
</style>
{% endblock %}
