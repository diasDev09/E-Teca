{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-4 text-success mb-2">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    <h2 class="fw-bold">Criar Usuário</h2>
                    <p class="text-muted">Preencha os dados para se registrar no sistema</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="django-form-style">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm">
                            <i class="bi bi-check-circle me-2"></i>Confirmar Cadastro
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-muted text-decoration-none small">
                        <i class="bi bi-arrow-left"></i> Já tenho uma conta, quero entrar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilização para os campos de cadastro */
    .django-form-style p { margin-bottom: 1.5rem; }
    .django-form-style p label { display: block; margin-bottom: 5px; font-weight: 500; color: #495057; }
    .django-form-style p input { 
        display: block; width: 100%; padding: 10px; 
        border: 1px solid #ced4da; border-radius: 8px; 
    }
    .django-form-style ul { font-size: 0.75rem; color: #dc3545; padding-left: 20px; margin-top: 5px; }
    .django-form-style .helptext { display: block; font-size: 0.75rem; color: #6c757d; margin-top: 5px; line-height: 1.2; }
</style>
{% endblock %}
